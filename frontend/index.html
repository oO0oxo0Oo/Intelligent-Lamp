<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyPilot 智能学习台灯</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">StudyPilot Dashboard</p>
        <h1>智能学习台灯状态看板</h1>
        <p class="hero-text">用于查看设备在线状态、实时环境数据、摄像头视频流、关键事件与学习摘要。</p>
      </div>
      <div class="hero-status">
        <div class="status-chip" id="device-online">设备离线</div>
        <div class="status-chip warning" id="study-state">状态未知</div>
        <div class="timestamp" id="last-updated">最近更新：--</div>
      </div>
    </header>

    <main>
      <section class="panel-grid">
        <article class="panel wide">
          <div class="panel-head">
            <h2>实时视频流</h2>
            <span class="mini-label" id="camera-meta">等待视频帧</span>
          </div>
          <div class="camera-shell">
            <img id="camera-feed" src="/api/camera/live" alt="摄像头实时流">
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>当前环境</h2>
            <span class="mini-label" id="env-label">--</span>
          </div>
          <div class="metric-grid">
            <div class="metric-card">
              <span>温度</span>
              <strong id="temperature">--</strong>
            </div>
            <div class="metric-card">
              <span>湿度</span>
              <strong id="humidity">--</strong>
            </div>
            <div class="metric-card">
              <span>光照</span>
              <strong id="lux">--</strong>
            </div>
            <div class="metric-card">
              <span>距离</span>
              <strong id="distance">--</strong>
            </div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>学习状态</h2>
            <span class="mini-label" id="presence-state">--</span>
          </div>
          <div class="summary-list">
            <div><span>学习模式</span><strong id="study-mode">--</strong></div>
            <div><span>距离风险</span><strong id="distance-level">--</strong></div>
            <div><span>本次时长</span><strong id="study-duration">--</strong></div>
            <div><span>会话开始</span><strong id="session-started">--</strong></div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>今日统计</h2>
            <span class="mini-label">自动汇总</span>
          </div>
          <div class="summary-list">
            <div><span>累计学习时长</span><strong id="today-duration">--</strong></div>
            <div><span>异常提醒次数</span><strong id="today-warnings">--</strong></div>
            <div><span>离桌次数</span><strong id="today-leaves">--</strong></div>
            <div><span>学习会话数</span><strong id="today-sessions">--</strong></div>
          </div>
        </article>

        <article class="panel wide">
          <div class="panel-head">
            <h2>最近事件</h2>
            <span class="mini-label">设备即时上报</span>
          </div>
          <div class="timeline" id="event-list"></div>
        </article>

        <article class="panel wide">
          <div class="panel-head">
            <h2>最近学习摘要</h2>
            <span class="mini-label">学习结束后生成</span>
          </div>
          <div class="summary-box" id="latest-summary">暂无摘要</div>
        </article>

        <article class="panel wide">
          <div class="panel-head">
            <h2>阈值配置</h2>
            <span class="mini-label">修改后设备会自动拉取</span>
          </div>
          <form id="settings-form" class="settings-form">
            <label>
              <span>距离告警阈值（mm）</span>
              <input type="number" name="distance_warning_mm" required>
            </label>
            <label>
              <span>在位判定阈值（mm）</span>
              <input type="number" name="distance_presence_mm" required>
            </label>
            <label>
              <span>低光照阈值（lux）</span>
              <input type="number" name="light_low_lux" required>
            </label>
            <label>
              <span>高温阈值（℃）</span>
              <input type="number" step="0.1" name="temperature_high_c" required>
            </label>
            <label>
              <span>高湿阈值（%）</span>
              <input type="number" step="0.1" name="humidity_high_percent" required>
            </label>
            <label>
              <span>离桌判定延时（s）</span>
              <input type="number" name="leave_grace_seconds" required>
            </label>
            <button type="submit">保存配置</button>
          </form>
          <div class="form-status" id="settings-status"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
